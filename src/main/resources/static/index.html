<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Monitor de Clima Real-Time</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/sockjs-client/1.5.1/sockjs.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/stomp.js/2.3.3/stomp.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f7f6; padding: 20px; }
        
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        
        #status { padding: 5px 15px; border-radius: 20px; font-size: 14px; }
        .conectado { background-color: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
        .desconectado { background-color: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }

        /* Grid de Cards */
        .grid-clima {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 15px;
        }

        .card {
            background-color: #fff;
            border-radius: 12px;
            padding: 15px;
            text-align: center;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            transition: transform 0.3s ease, background-color 0.5s ease;
            border: 2px solid transparent;
        }

        .card h3 { margin: 0 0 10px 0; font-size: 1.1rem; color: #333; }
        .temp { font-size: 2rem; font-weight: bold; margin: 10px 0; }
        .desc { font-size: 0.9rem; color: #666; font-style: italic; }
        .hora { font-size: 0.7rem; color: #999; margin-top: 10px; }

        /* Estilos Dinâmicos */
        .quente { background-color: #ff7675; color: white; }
        .quente .desc, .quente .hora, .quente h3 { color: white; }
        
        .frio { background-color: #74b9ff; color: white; }
        .frio .desc, .frio .hora, .frio h3 { color: white; }

        /* Efeito de "piscar" ao atualizar */
        .updated { transform: scale(1.05); }
    </style>
</head>
<body>

    <div class="header">
        <h1>Monitoramento de Clima</h1>
        <span id="status" class="desconectado">Desconectado</span>
    </div>

    <div class="grid-clima" id="grid">
        </div>

    <script>
        var stompClient = null;
        const cidadesIniciais = [
            "Vianópolis", "Goiânia", "São Paulo", "Curitiba", "Manaus", 
            "Salvador", "Fortaleza", "Cuiabá", "Porto Alegre", "Brasília"
        ];

        function inicializarDashboard() {
            const grid = document.getElementById('grid');
            cidadesIniciais.forEach(cidade => {
                const idFormatado = cidade.replace(/\s+/g, '-').toLowerCase();
                const cardHtml = `
                    <div class="card" id="card-${idFormatado}">
                        <h3>${cidade}</h3>
                        <div class="temp">--°C</div>
                        <div class="desc">Aguardando...</div>
                        <div class="hora">--:--:--</div>
                    </div>
                `;
                grid.innerHTML += cardHtml;
            });
        }

        function conectar() {
            var socket = new SockJS('/ws-clima');
            stompClient = Stomp.over(socket);
            stompClient.debug = null;

            stompClient.connect({}, function (frame) {
                const statusLabel = document.getElementById('status');
                statusLabel.innerText = "Conectado";
                statusLabel.className = "conectado";
                
                stompClient.subscribe('/topic/clima', function (mensagem) {
                    atualizarCard(JSON.parse(mensagem.body));
                });
            }, function (erro) {
                const statusLabel = document.getElementById('status');
                statusLabel.innerText = "Erro ao conectar";
                statusLabel.className = "desconectado";
            });
        }

        function atualizarCard(dados) {
            const idFormatado = dados.cidade.replace(/\s+/g, '-').toLowerCase();
            const card = document.getElementById(`card-${idFormatado}`);
            
            if (card) {
                card.querySelector('.temp').innerText = `${dados.temperatura}°C`;
                card.querySelector('.desc').innerText = dados.descricao;
                card.querySelector('.hora').innerText = `Atualizado: ${dados.horario}`;

                card.classList.remove('quente', 'frio', 'updated');
                
                if (dados.temperatura > 25) {
                    card.classList.add('quente');
                } else {
                    card.classList.add('frio');
                }

                setTimeout(() => card.classList.add('updated'), 10);
                setTimeout(() => card.classList.remove('updated'), 300);
            }
        }

        
        inicializarDashboard();
        conectar();
    </script>
</body>
</html>
